name: Claude PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  review:
    # Skip drafts and fork PRs: CLAUDE_CODE_OAUTH_TOKEN is not available to
    # forks, so the step would fail with a secret-not-found error.
    # synchronize re-reviews after each fix-up push (and dismisses stale
    # approvals when branch protection is configured to do so).
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - name: Claude review
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            Focus on:
            - Correctness and logic errors; edge cases the change misses.
            - Design tokens: values must match the MCTL design spec; no
              hard-coded colors/sizes that bypass @mctlhq/tokens.
            - Cross-package contracts: package exports, peerDependencies,
              lockstep versioning (all package versions must match).
            - Vue components: prop typing, accessibility, scoped styles, no
              leaking global CSS.
            - Build correctness: tsup/Vite/Storybook config, CI scripts.

            Follow the conventions in this repository's CLAUDE.md (conventional
            commits, English only, no emoji, M-prefixed components).

            If the diff is trivial — only config/values YAML, a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, broken build, broken contract).
            - P2 — should fix before merge (likely bug, missing piece).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review, and pr-steward will
            only auto-merge a feat/agents-* PR once an approving review exists
            at the current head SHA). Include the P1/P2/P3 counts in the body;
            be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model claude-sonnet-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
